<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d14;
    --surface: #111520;
    --surface2: #161b28;
    --border: rgba(255,255,255,0.07);
    --border-active: rgba(59,130,246,0.5);
    --accent: #3b82f6;
    --accent2: #f97316;
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;
    --glow-blue: rgba(59,130,246,0.15);
    --glow-orange: rgba(249,115,22,0.15);
    --card-h: 180px;
  }
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    overflow: hidden;
  }
 
  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
 
  /* Sidebar */
  .sidebar {
    width: 64px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 0;
    gap: 6px;
    z-index: 10;
    position: relative;
  }
 
  .sidebar-logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: white;
    box-shadow: 0 0 20px rgba(59,130,246,0.4);
  }
 
  .sidebar-btn {
    width: 42px; height: 42px;
    border-radius: 10px;
    background: transparent;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    transition: all 0.2s;
    position: relative;
  }
  .sidebar-btn:hover, .sidebar-btn.active {
    background: rgba(59,130,246,0.15);
    color: var(--accent);
  }
  .sidebar-btn.active::before {
    content: '';
    position: absolute;
    left: -1px; top: 25%; bottom: 25%;
    width: 2px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }
  .sidebar-btn svg { width: 18px; height: 18px; }
 
  /* Main content */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
 
  /* Topbar */
  .topbar {
    height: 64px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    flex-shrink: 0;
  }
 
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    white-space: nowrap;
  }
  .logo-text span { color: var(--accent); }
 
  .search-bar {
    flex: 1;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }
  .search-bar input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 16px 9px 40px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--text-muted); }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); width: 16px; height: 16px;
  }
 
  .topbar-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 10px;
  }
  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 13px;
    cursor: pointer;
    border: 2px solid var(--border-active);
  }
 
  /* Nav tabs */
  .nav-tabs {
    height: 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 0;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
 
  .tab {
    padding: 0 16px;
    height: 100%;
    display: flex; align-items: center;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    user-select: none;
  }
  .tab:hover { color: var(--text-dim); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
 
  /* Content area */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 28px 28px 40px;
  }
  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
 
  /* Section */
  .section { margin-bottom: 40px; }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
  }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
 
  /* Grid layout: all sections side by side */
  .all-sections {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
  }
 
  .add-btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .add-btn:hover { background: #2563eb; box-shadow: 0 0 16px rgba(59,130,246,0.4); }
 
  /* Tool cards grid */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
 
  .card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--glow-blue), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card:hover { border-color: var(--border-active); transform: translateY(-2px); }
  .card:hover::before { opacity: 1; }
  .card.orange { border-color: rgba(249,115,22,0.3); }
  .card.orange::before { background: linear-gradient(135deg, var(--glow-orange), transparent); }
  .card.orange:hover { border-color: rgba(249,115,22,0.6); }
 
  .card-icon {
    width: 38px; height: 38px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 10px;
    font-size: 18px;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
 
  .card-name {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 3px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    position: relative; z-index: 1;
  }
  .card-desc {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 12px;
    position: relative; z-index: 1;
  }
 
  .card-actions {
    display: flex; align-items: center; gap: 6px;
    position: relative; z-index: 1;
  }
  .visit-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    color: var(--text-dim);
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: all 0.2s;
  }
  .visit-btn:hover { background: rgba(59,130,246,0.15); color: var(--accent); border-color: rgba(59,130,246,0.3); }
  .icon-btn {
    width: 26px; height: 26px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.2s;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
  .icon-btn svg { width: 12px; height: 12px; }
 
  /* Add new card */
  .card-add {
    background: transparent;
    border: 1px dashed rgba(59,130,246,0.25);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px;
    color: var(--text-muted);
    transition: all 0.25s;
    min-height: 110px;
  }
  .card-add:hover { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,0.05); }
  .card-add span { font-size: 12px; font-weight: 600; }
 
  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: none; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 440px;
    max-width: 95vw;
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal h3 {
    font-family: 'Syne', sans-serif;
    font-size: 18px; font-weight: 700;
    margin-bottom: 20px;
  }
  .modal label {
    display: block;
    font-size: 12px; font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 6px; margin-top: 14px;
  }
  .modal input, .modal select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .modal input:focus, .modal select:focus { border-color: var(--accent); }
  .modal select option { background: var(--surface); }
  .modal-actions {
    display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px;
  }
  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 18px;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-weight: 600; font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }
  .btn-save {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 9px 18px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600; font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-save:hover { background: #2563eb; }
 
  /* Notification toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid rgba(59,130,246,0.4);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px; font-weight: 500;
    z-index: 200;
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateY(0); opacity: 1; }
 
  /* Edit modal */
  .delete-btn {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 9px 18px;
    color: #ef4444;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600; font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    margin-right: auto;
  }
  .delete-btn:hover { background: rgba(239,68,68,0.2); }
 
  /* Fade in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card, .card-add { animation: fadeUp 0.4s ease backwards; }
</style>
</head>

  { id:12,name:'ElevenLabs',      desc:'AI ElevenLabs Founded',      cat:'video',       style:'',       icon:'🎙️', url:'https://elevenlabs.io' },
  { id:13,name:'D-ID',            desc:'AI-ID Leaturer Tool',        cat:'video',       style:'orange', icon:'🎭', url:'https://www.d-id.com' },
  { id:14,name:'Soundraw',        desc:'AI Soundraw- Flicker',       cat:'video',       style:'orange', icon:'🎵', url:'https://soundraw.io' },
  { id:15,name:'Clamar Solution', desc:'AI Art.eam Tool',            cat:'video',       style:'',       icon:'🤖', url:'#' },
  { id:16,name:'Power Training',  desc:'Daduoanit entindum',         cat:'video',       style:'',       icon:'💪', url:'#' },
];
let nextId = 17;
 
// ── Render ────────────────────────────────────────────────────────────────────
let currentFilter = 'all';
let searchQuery = '';
 
function render() {
  const container = document.getElementById('allSections');
  const catKeys = Object.keys(CATEGORIES);
  let visibleCats = currentFilter === 'all' ? catKeys : [currentFilter];
 
  let html = '';
  visibleCats.forEach(cat => {
    let catTools = tools.filter(t => t.cat === cat);
    if (searchQuery) {
      catTools = catTools.filter(t =>
        t.name.toLowerCase().includes(searchQuery) ||
        t.desc.toLowerCase().includes(searchQuery)
      );
    }
    if (searchQuery && catTools.length === 0) return;
 
    html += `<div class="section">
      <div class="section-header">
        <div class="section-title">${CATEGORIES[cat].label}</div>
        <button class="add-btn" onclick="openAddModal('${cat}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          ADD NEW TOOL
        </button>
      </div>
      <div class="cards-grid" id="grid-${cat}">`;
 
    catTools.forEach((tool, i) => {
      const colors = ICON_COLORS[cat];
      const bg = colors[tool.id % colors.length];
      html += cardHTML(tool, bg, i);
    });
 
    html += `
        <div class="card-add" onclick="openAddModal('${cat}')" style="animation-delay:${catTools.length * 0.05}s">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>ADD NEW TOOL</span>
        </div>
      </div>
    </div>`;
  });
 
  container.innerHTML = html || '<div style="color:var(--text-muted);padding:40px;text-align:center;">No tools match your search.</div>';
 
  // Adjust grid columns based on visible categories
  if (currentFilter !== 'all') {
    container.style.gridTemplateColumns = '1fr';
    // wider 3-col cards grid
    document.querySelectorAll('.cards-grid').forEach(g => g.style.gridTemplateColumns = 'repeat(3,1fr)');
  } else {
    container.style.gridTemplateColumns = 'repeat(3,1fr)';
    document.querySelectorAll('.cards-grid').forEach(g => g.style.gridTemplateColumns = 'repeat(2,1fr)');
  }
}
 
function cardHTML(tool, bg, i) {
  return `<div class="card ${tool.style}" style="animation-delay:${i * 0.05}s" data-id="${tool.id}">
    <div class="card-icon" style="background:${bg}22; font-size:20px;">${tool.icon}</div>
    <div class="card-name">${tool.name}</div>
    <div class="card-desc">${tool.desc}</div>
    <div class="card-actions">
      <button class="visit-btn" onclick="visitTool(event,'${tool.url}')">
        Visit Website
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </button>
      <button class="icon-btn" onclick="openEditModal(event,${tool.id})" title="Edit">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button class="icon-btn" onclick="deleteDirect(event,${tool.id})" title="Delete">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>
  </div>`;
}
 
// ── Modal ─────────────────────────────────────────────────────────────────────
let editingId = null;
let addingCat = null;
 
function openAddModal(cat) {
  editingId = null; addingCat = cat;
  document.getElementById('modalTitle').textContent = 'Add New Tool';
  document.getElementById('fieldName').value = '';
  document.getElementById('fieldDesc').value = '';
  document.getElementById('fieldUrl').value = '';
  document.getElementById('fieldCategory').value = cat;
  document.getElementById('fieldStyle').value = '';
  document.getElementById('fieldIcon').value = '🤖';
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('modalOverlay').classList.add('open');
}
 
function openEditModal(e, id) {
  e.stopPropagation();
  const tool = tools.find(t => t.id === id);
  if (!tool) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Tool';
  document.getElementById('fieldName').value = tool.name;
  document.getElementById('fieldDesc').value = tool.desc;
  document.getElementById('fieldUrl').value = tool.url;
  document.getElementById('fieldCategory').value = tool.cat;
  document.getElementById('fieldStyle').value = tool.style;
  document.getElementById('fieldIcon').value = tool.icon;
  document.getElementById('deleteBtn').style.display = 'block';
  document.getElementById('modalOverlay').classList.add('open');
}
 
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
 
function saveTool() {
  const name = document.getElementById('fieldName').value.trim();
  const desc = document.getElementById('fieldDesc').value.trim();
  const url  = document.getElementById('fieldUrl').value.trim() || '#';
  const cat  = document.getElementById('fieldCategory').value;
  const style= document.getElementById('fieldStyle').value;
  const icon = document.getElementById('fieldIcon').value.trim() || '🤖';
  if (!name) { document.getElementById('fieldName').focus(); return; }
 
  if (editingId) {
    const t = tools.find(t => t.id === editingId);
    Object.assign(t, { name, desc, url, cat, style, icon });
    showToast('Tool updated!');
  } else {
    tools.push({ id: nextId++, name, desc, url, cat, style, icon });
    showToast('Tool added!');
  }
  closeModal();
  render();
}
 
function deleteTool() {
  tools = tools.filter(t => t.id !== editingId);
  closeModal();
  render();
  showToast('Tool deleted.');
}
 
function deleteDirect(e, id) {
  e.stopPropagation();
  tools = tools.filter(t => t.id !== id);
  render();
  showToast('Tool deleted.');
}
 
function visitTool(e, url) {
  e.stopPropagation();
  if (url && url !== '#') window.open(url, '_blank');
  else showToast('No URL configured.');
}
 
// ── Tabs ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    render();
  });
});
 
// ── Sidebar buttons ───────────────────────────────────────────────────────────
document.querySelectorAll('.sidebar-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});
 
// ── Search ────────────────────────────────────────────────────────────────────
function filterTools(val) {
  searchQuery = val.toLowerCase().trim();
  render();
}
 
// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
 
// ── Close modal on overlay click ──────────────────────────────────────────────
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
 
// ── Init ──────────────────────────────────────────────────────────────────────
render();
</script>
